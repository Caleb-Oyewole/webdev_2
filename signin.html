<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Houdy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Public+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <a href="/" class="logo"><span class="dot"></span>Houdy</a>
            <ul class="nav-links">
                <li><a href="/listings.html">Listings</a></li>
                <li><a href="/#why">Why Houdy</a></li>
                <li><a href="/#steps">How it works</a></li>
                <li><a href="/#testimonials">Reviews</a></li>
            </ul>
            <div class="nav-cta">
                <a href="signin.html" class="signin">Sign in</a>
                <a href="list-property.html" class="btn btn-primary">List your property</a>
            </div>
        </nav>
    </header>
    <section class="form-page">
        <div class="wrap">
            <div class="form-shell">
                <span class="eyebrow">Welcome back</span>
                <h2>Sign in to your Houdy account</h2>
                <form id="signin-form">
                    <div class="form-field">
                        <label for="email">Email address</label>
                        <input id="email" name="email" type="email" placeholder="you@school.edu" required>
                    </div>
                    <div class="form-field">
                        <label for="password">Password</label>
                        <input id="password" name="password" type="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Sign in</button>
                        <a href="/" class="btn btn-ghost">Back to home</a>
                    </div>
                    <div id="signin-status" class="form-status"></div>
                </form>
            </div>
        </div>
    </section>
    <script src="scripts.js"></script>
</body>

</html>
