<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listings — Houdy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Public+Sans:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <nav>
            <a href="/" class="logo"><span class="dot"></span>Houdy</a>
            <ul class="nav-links">
                <li><a href="/listings.html">Listings</a></li>
                <li><a href="/#why">Why Houdy</a></li>
                <li><a href="/#steps">How it works</a></li>
                <li><a href="/#testimonials">Reviews</a></li>
            </ul>
            <div class="nav-cta">
                <a href="/signin.html" class="signin">Sign in</a>
                <a href="/list-property.html" class="btn btn-primary">List your property</a>
            </div>
        </nav>
    </header>
    <section class="form-page">
        <div class="wrap">
            <div class="form-shell">
                <div class="listings-intro">
                    <div>
                        <span class="eyebrow">Find your room</span>
                        <h2>Search student housing listings</h2>
                        <p>Use the filters below to refine your search and see live results from our current property
                            inventory.</p>
                    </div>
                </div>
                <form id="listings-search-form">
                    <div class="form-field">
                        <label for="location">Location</label>
                        <input id="location" name="location" type="text" placeholder="City, campus or building">
                    </div>
                    <div class="form-field">
                        <label for="budget">Budget (₦)</label>
                        <input id="budget" name="budget" type="number" placeholder="Max monthly rent">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Search listings</button>
                        <a href="/" class="btn btn-ghost">Back to home</a>
                    </div>
                </form>
                <div class="form-status" id="results-count"></div>
                <div id="search-results" class="result-list"></div>
            </div>
        </div>
    </section>
    <script src="scripts.js"></script>
</body>

</html>
